<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tile Shift — PlayHive</title>
  <style>
    :root {
      --navy:        #0d1b2a;
      --navy-mid:    #132338;
      --navy-card:   #1a2f47;
      --navy-light:  #1f3a57;
      --lime:        #7ed321;
      --lime-dark:   #5fab00;
      --lime-glow:   rgba(126,211,33,0.18);
      --orange:      #ff7b00;
      --orange-dark: #e06900;
      --orange-glow: rgba(255,123,0,0.18);
      --cyan:        #00d4ff;
      --cyan-glow:   rgba(0,212,255,0.18);
      --pink:        #ff4da6;
      --pink-glow:   rgba(255,77,166,0.18);
      --text:        #e8f1fa;
      --text-dim:    #7a99bb;
      --text-dark:   #3d5a75;
      --border:      rgba(255,255,255,0.08);
      --border-lime: rgba(126,211,33,0.3);
      --radius:      10px;
      --radius-lg:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Hard lock — no scroll ever */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent pinch zoom & scroll */
    }
	@font-face {
	  font-family: 'Fredoka One';
	  src: url("../../fonts/fredokaone.woff2") format("woff2");
	  font-weight: 400;
	  font-style: normal;
	}
	@font-face {
	  font-family: 'Nunito';
	  src: url("../../fonts/Nunito-VariableFont_wght.ttf") format("truetype");
	  font-weight: 200 900;
	  font-style: normal;
	}
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--navy);
      color: var(--text);
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 var(--lime-glow)} 50%{box-shadow:0 0 20px 8px var(--lime-glow)} }
    @keyframes winBounce { 0%{transform:scale(1)} 30%{transform:scale(1.06) rotate(-1deg)} 60%{transform:scale(1.02) rotate(.5deg)} 100%{transform:scale(1)} }
    @keyframes float     { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(3deg)} }
    @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

    /* ════════════════════════════════
       SCREENS
    ════════════════════════════════ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      z-index: 1;
    }
    .screen.hidden { display: none; }

    /* ════════════════════════════════
       MAIN MENU
    ════════════════════════════════ */
    #menu { animation: fadeIn .35s ease; padding: 16px 20px; text-align: center; }

    .menu-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .msym {
      position: absolute; opacity: .055;
      animation: float 7s ease-in-out infinite; user-select: none;
      font-size: clamp(2rem, 5vw, 4.5rem);
    }

    .menu-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 400px;
      height: 100%; max-height: 100vh;
      padding: 16px 0; justify-content: center;
      gap: clamp(20px, 4vh, 32px);
    }

    .menu-header { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .menu-icon {
      font-size: min(15vh, 6rem);
      animation: float 4s ease-in-out infinite;
      line-height: 1; margin-bottom: 10px;
    }
    .menu-title {
      font-family: 'Fredoka One', cursive;
      font-size: min(6vh, 3.2rem);
      color: #fff; letter-spacing: .03em; line-height: 1;
    }
    .menu-title em { 
      font-style: normal; color: var(--cyan); 
      text-shadow: 0 0 16px rgba(0,212,255,0.4);
    }
    .menu-sub {
      font-size: min(2vh, .95rem);
      color: var(--text-dim); font-weight: 700;
    }

    .diff-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    
    .diff-card {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
      background: var(--navy-card);
      border: 2px solid var(--border);
      border-radius: 100px;
      padding: 14px 24px;
      cursor: pointer; transition: all .25s cubic-bezier(.4,0,.2,1);
      animation: fadeUp .45s ease both;
    }
    .diff-card:nth-child(1){animation-delay:.08s}
    .diff-card:nth-child(2){animation-delay:.15s}
    .diff-card:nth-child(3){animation-delay:.22s}
    
    .diff-card:hover { 
      transform: translateY(-3px); 
      border-color: var(--cc,var(--lime)); 
      box-shadow: 0 8px 20px rgba(0,0,0,.3); 
    }
    .diff-card.selected { 
      background: var(--cc-glow); 
      border-color: var(--cc); 
      transform: scale(1.03);
      box-shadow: 0 0 16px var(--cc-glow);
    }
    
    .dc-left { display: flex; align-items: center; gap: 16px; }
    .dc-icon { font-size: 2rem; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .dc-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .dc-name { font-family:'Fredoka One',cursive; font-size: 1.25rem; color:#fff; line-height: 1;}
    .dc-desc { font-size: 0.8rem; font-weight:700; color:var(--text-dim); }

    .play-btn {
      width: 100%;
      font-family: 'Fredoka One', cursive;
      font-size: min(2.8vh, 1.3rem); letter-spacing: .05em;
      padding: 18px 24px;
      border-radius: 100px;
      background: var(--lime); color: var(--navy); border: none;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(126,211,33,.4);
      transition: all .2s;
      animation: pulseGlow 2.5s ease-in-out infinite, fadeUp .45s ease .3s both;
    }
    .play-btn:hover { background:var(--lime-dark); transform:translateY(-2px); }
    .play-btn:active{ transform:translateY(0); }

    /* ════════════════════════════════
       GAME VIEW
    ════════════════════════════════ */
    #game {
      justify-content: flex-start;
      padding: clamp(6px,1.5vh,12px) clamp(8px,2vw,16px) clamp(6px,1.5vh,12px);
      gap: clamp(10px,2vh,20px);
    }

    #topbar {
      width: 100%; max-width: 640px; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-chip {
      display: flex; align-items: center; gap: 4px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: clamp(4px,1vh,8px) clamp(10px,2vw,16px);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.85rem,2.2vh,1.1rem);
      color: var(--text-dim);
      white-space: nowrap;
    }
    .stat-chip .val { color: var(--cyan); }
    .stat-chip .val.lime { color: var(--lime); }
    
    #status-chip {
      flex: 1; justify-content: center;
      color: var(--text); border-color: rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }

    .back-btn {
      flex-shrink: 0;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-dim);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.72rem,1.8vh,.86rem); letter-spacing: .04em;
      padding: clamp(4px,1vh,8px) clamp(10px,2vw,14px);
      cursor: pointer; transition: all .18s;
    }
    .back-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* Tile Board */
    #grid-wrap {
      width: 100%; max-width: 500px;
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
    }
    
    #Tile-board {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-height: 100%;
      background: var(--navy-card);
      border-radius: var(--radius-lg);
      border: 4px solid rgba(0,0,0,0.4);
      box-shadow: 0 16px 32px rgba(0,0,0,0.5);
      padding: 6px;
      overflow: hidden;
    }

    /* Used to temporarily disable slide animations when shuffling */
    #Tile-board.no-animate .tile {
      transition: none !important;
    }

    .tile {
      position: absolute;
      width: calc(100% / var(--grid-size));
      height: calc(100% / var(--grid-size));
      padding: clamp(3px, 1vw, 6px);
      transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
    }

    .tile-inner.shake-err {
      animation: shake 0.3s ease-in-out;
    }

    .tile-inner {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      color: var(--text);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
    }
    
    /* Hover effect for playable tiles */
    .tile-inner:hover {
      filter: brightness(1.2);
    }
    .tile-inner:active {
      transform: scale(0.96);
    }

    .tile.correct .tile-inner {
      background: linear-gradient(135deg, var(--lime), var(--lime-dark));
      color: var(--navy);
      border-color: rgba(255,255,255,0.4);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 4px 15px var(--lime-glow);
    }

    /* ── OVERLAY ── */
    #overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.84);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #overlay.show { display: flex; }
    #win-box {
      background: var(--navy-mid);
      border: 2px solid var(--border-lime);
      border-radius: var(--radius-lg);
      padding: clamp(20px,4vh,36px) clamp(18px,4vw,32px);
      text-align: center;
      max-width: 360px; width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      animation: winBounce .55s ease;
    }
    .win-trophy { font-size:clamp(2.4rem,6vh,4rem); margin-bottom:8px; display:block; }
    .win-title  { font-family:'Fredoka One',cursive; font-size:clamp(1.5rem,4vh,2rem); color:var(--lime); margin-bottom:3px; }
    .win-sub    { font-size:clamp(.78rem,2vh,.9rem); color:var(--text-dim); font-weight:700; margin-bottom:18px; }
    
    .win-stats  { display:flex; gap:10px; justify-content:center; margin-bottom:22px; flex-wrap:wrap; }
    .win-stat   { background:var(--navy); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; display:flex; flex-direction:column; gap:4px; min-width:86px; }
    .win-stat-val{ font-family:'Fredoka One',cursive; font-size:clamp(1.2rem,3.5vh,1.6rem); color:var(--cyan); line-height:1; }
    .win-stat-lbl{ font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dark); }
    
    .win-btns   { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .win-btn    { font-family:'Fredoka One',cursive; font-size:clamp(.88rem,2.4vh,1rem); letter-spacing:.04em; padding:clamp(9px,2vh,12px) clamp(18px,4vw,26px); border-radius:100px; border:none; cursor:pointer; transition:all .2s; }
    .win-btn-primary  { background:var(--lime); color:var(--navy); box-shadow:0 5px 18px rgba(126,211,33,.4); animation:pulseGlow 2s ease-in-out infinite; }
    .win-btn-primary:hover { background:var(--lime-dark); transform:translateY(-2px); }
    .win-btn-secondary{ background:var(--navy-card); color:var(--text-dim); border:2px solid var(--border); }
    .win-btn-secondary:hover{ border-color:var(--orange); color:var(--orange); }
	
	.menu-icon {
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.icon-img {
		height: 1em; /* Matches the height of the surrounding text/emoji */
		width: auto;  /* Maintains aspect ratio */
		display: inline-block;
		vertical-align: middle;
	}

  </style>
</head>
<body>

<!-- ══════════════ MAIN MENU ══════════════ -->
<div id="menu" class="screen">
  <div class="menu-bg" aria-hidden="true">
    <div class="msym" style="top:6%;left:4%;animation-delay:0s">🧩</div>
    <div class="msym" style="bottom:12%;right:7%;animation-delay:.7s">🔲</div>
    <div class="msym" style="top:10%;right:5%;animation-delay:1.2s">🟦</div>
    <div class="msym" style="top:60%;left:16%;animation-delay:3.2s">🟧</div>
    <div class="msym" style="bottom:50%;left:16%;animation-delay:2.1s">🧩</div>
    <div class="msym" style="bottom:28%;right:16%;animation-delay:1.5s">🔲</div>
    <div class="msym" style="top:46%;left:2%;animation-delay:1.8s">🟩</div>
    <div class="msym" style="top:30%;right:12%;animation-delay:0.5s">🧩</div>
  </div>

  <div class="menu-content">
    <div class="menu-header">
      <div class="menu-icon">
		<img src="icon.png" alt="Menu Icon" class="icon-img">
      </div>
      <div class="menu-title">Tile <em>Shift</em></div>
      <div class="menu-sub">Slide the tiles into order!</div>
    </div>

    <div class="diff-cards">
      <div class="diff-card selected" data-mode="easy" style="--cc:var(--lime); --cc-glow:var(--lime-glow)" tabindex="0" role="button" aria-pressed="true">
        <div class="dc-left">
          <div class="dc-icon">🟩</div>
          <div class="dc-info">
            <span class="dc-name">3 x 3</span>
            <span class="dc-desc">Relaxing • 8 Tiles</span>
          </div>
        </div>
      </div>
      
      <div class="diff-card" data-mode="medium" style="--cc:var(--cyan); --cc-glow:var(--cyan-glow)" tabindex="0" role="button" aria-pressed="false">
        <div class="dc-left">
          <div class="dc-icon">🟦</div>
          <div class="dc-info">
            <span class="dc-name">4 x 4</span>
            <span class="dc-desc">Classic • 15 Tiles</span>
          </div>
        </div>
      </div>
      
      <div class="diff-card" data-mode="hard" style="--cc:var(--pink); --cc-glow:var(--pink-glow)" tabindex="0" role="button" aria-pressed="false">
        <div class="dc-left">
          <div class="dc-icon">🟪</div>
          <div class="dc-info">
            <span class="dc-name">5 x 5</span>
            <span class="dc-desc">Brain Burner • 24 Tiles</span>
          </div>
        </div>
      </div>
    </div>

    <button class="play-btn" id="play-btn">▶ Play Now</button>
  </div>
</div>

<!-- ══════════════ GAME VIEW ══════════════ -->
<div id="game" class="screen hidden">
  <div id="topbar">
    <div class="stat-chip">🕒 <span class="val lime" id="time-val">0:00</span></div>
    <div class="stat-chip" id="status-chip">Moves: <span class="val" id="moves-val">0</span></div>
    <div class="stat-chip" style="display:none;" id="best-chip">👑 <span class="val" id="best-val">--</span></div>
    <button class="back-btn" id="back-btn">← Back</button>
  </div>
  <div id="grid-wrap"><div id="Tile-board"></div></div>
</div>

<!-- ══════════════ GAME OVER OVERLAY ══════════════ -->
<div id="overlay" role="dialog" aria-modal="true" aria-label="Game Over">
  <div id="win-box" class="game-over-box">
    <span class="win-trophy" id="win-trophy">🎉</span>
    <div class="win-title" id="win-title">Puzzle Solved!</div>
    <div class="win-sub" id="win-sub">Great job organizing those tiles.</div>
    
    <div class="win-stats">
      <div class="win-stat"><span class="win-stat-val" id="ws-time">0:00</span><span class="win-stat-lbl">Time</span></div>
      <div class="win-stat"><span class="win-stat-val" id="ws-score">0</span><span class="win-stat-lbl">Moves</span></div>
      <div class="win-stat" id="ws-best-box"><span class="win-stat-val" id="ws-best">0</span><span class="win-stat-lbl">Best</span></div>
    </div>
    <div class="win-btns">
      <button class="win-btn win-btn-primary" id="play-again-btn">▶ Next Round</button>
      <button class="win-btn win-btn-secondary" id="back-to-menu-btn">☰ Menu</button>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const MODES = {
  easy:   { size: 3, shuffles: 150 },
  medium: { size: 4, shuffles: 300 },
  hard:   { size: 5, shuffles: 500 },
};

// Game State
let mode = 'easy';
let tiles = []; 
let emptyPos = { r: 0, c: 0 };
let moves = 0;
let bestScores = { easy: Infinity, medium: Infinity, hard: Infinity };
let gameActive = false;

// Timer State
let startTime = 0;
let timerInterval = null;
let finalTimeString = "0:00";

/* ── UI ELEMENTS ── */
const menuEl       = document.getElementById('menu');
const gameEl       = document.getElementById('game');
const board        = document.getElementById('Tile-board');
const movesVal     = document.getElementById('moves-val');
const timeVal      = document.getElementById('time-val');
const bestVal      = document.getElementById('best-val');
const bestChip     = document.getElementById('best-chip');
const overlay      = document.getElementById('overlay');

/* ── MENU INTERACTIONS ── */
document.querySelectorAll('.diff-card').forEach(card => {
  card.addEventListener('click', () => selectMode(card.dataset.mode));
  card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') selectMode(card.dataset.mode); });
});

function selectMode(m) {
  mode = m;
  document.querySelectorAll('.diff-card').forEach(c => {
    const on = c.dataset.mode === m;
    c.classList.toggle('selected', on);
    c.setAttribute('aria-pressed', String(on));
  });
}

document.getElementById('play-btn').addEventListener('click', () => {
  menuEl.classList.add('hidden');
  gameEl.classList.remove('hidden');
  updateBestUI();
  startGame();
});

function goToMenu() {
  gameActive = false;
  clearInterval(timerInterval);
  overlay.classList.remove('show');
  gameEl.classList.add('hidden');
  menuEl.classList.remove('hidden');
}

document.getElementById('back-btn').addEventListener('click', goToMenu);
document.getElementById('back-to-menu-btn').addEventListener('click', goToMenu);
document.getElementById('play-again-btn').addEventListener('click', () => {
  overlay.classList.remove('show');
  startGame();
});

function updateBestUI() {
  if (bestScores[mode] === Infinity) {
    bestChip.style.display = 'none';
  } else {
    bestChip.style.display = 'flex';
    bestVal.textContent = bestScores[mode];
  }
}

/* ── GAME SETUP ── */
function startGame() {
  gameActive = false;
  moves = 0;
  movesVal.textContent = moves;
  clearInterval(timerInterval);
  timeVal.textContent = "0:00";
  
  buildBoard();
  
  // Quick timeout to allow the board to render before shuffling
  setTimeout(() => {
    shuffleBoard();
    startTimer();
    gameActive = true;
  }, 100);
}

function startTimer() {
  startTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const secs = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    finalTimeString = `${m}:${s.toString().padStart(2, '0')}`;
    timeVal.textContent = finalTimeString;
  }, 1000);
}

function buildBoard() {
  board.innerHTML = '';
  const size = MODES[mode].size;
  board.style.setProperty('--grid-size', size);
  tiles = [];

  // Create N x N - 1 tiles
  for (let i = 1; i < size * size; i++) {
    const targetR = Math.floor((i - 1) / size);
    const targetC = (i - 1) % size;
    
    const tile = document.createElement('div');
    tile.className = 'tile correct'; // Start in correct state
    tile.innerHTML = `<div class="tile-inner">${i}</div>`;
    
    // Prevent default touch interactions like scrolling while swiping tiles
    tile.addEventListener('touchstart', e => e.preventDefault(), {passive: false});
    tile.addEventListener('pointerdown', () => handleTileClick(tileObj));
    
    board.appendChild(tile);
    
    const tileObj = { el: tile, val: i, r: targetR, c: targetC, targetR, targetC };
    tiles.push(tileObj);
    updateTilePos(tileObj);
  }
  
  // The empty space
  emptyPos = { r: size - 1, c: size - 1 };
}

function updateTilePos(t) {
  t.el.style.transform = `translate(calc(${t.c} * 100%), calc(${t.r} * 100%))`;
  if (t.r === t.targetR && t.c === t.targetC) {
    t.el.classList.add('correct');
  } else {
    t.el.classList.remove('correct');
  }
}

/* ── GAME LOGIC ── */
function handleTileClick(t) {
  if (!gameActive) return;

  const dr = Math.abs(t.r - emptyPos.r);
  const dc = Math.abs(t.c - emptyPos.c);
  
  // If adjacent to empty space (taxicab distance === 1)
  if (dr + dc === 1) {
    // Swap positions
    const tempR = t.r; 
    const tempC = t.c;
    t.r = emptyPos.r; 
    t.c = emptyPos.c;
    emptyPos.r = tempR; 
    emptyPos.c = tempC;
    
    updateTilePos(t);
    moves++;
    movesVal.textContent = moves;
    
    checkWinCondition();
  } else {
    // Invalid move shake animation
    const inner = t.el.querySelector('.tile-inner');
    inner.classList.remove('shake-err');
    void inner.offsetWidth; // Trigger reflow to restart animation
    inner.classList.add('shake-err');
  }
}

function shuffleBoard() {
  const size = MODES[mode].size;
  const numShuffles = MODES[mode].shuffles;
  
  // Disable CSS transitions temporarily for instant shuffling
  board.classList.add('no-animate');
  
  let lastMovedTile = null;
  
  for (let i = 0; i < numShuffles; i++) {
    // Find all tiles adjacent to the current empty space
    let neighbors = tiles.filter(t => Math.abs(t.r - emptyPos.r) + Math.abs(t.c - emptyPos.c) === 1);
    
    // To ensure a thorough shuffle, avoid immediately undoing the previous move if possible
    if (neighbors.length > 1 && lastMovedTile) {
      neighbors = neighbors.filter(t => t !== lastMovedTile);
    }
    
    // Pick a random valid neighbor to slide into the empty spot
    const move = neighbors[Math.floor(Math.random() * neighbors.length)];
    
    const tempR = move.r; 
    const tempC = move.c;
    move.r = emptyPos.r; 
    move.c = emptyPos.c;
    emptyPos.r = tempR; 
    emptyPos.c = tempC;
    
    lastMovedTile = move;
  }
  
  // Apply final shuffled positions to the DOM
  tiles.forEach(updateTilePos);
  
  // Force a reflow before re-enabling transitions
  void board.offsetWidth;
  board.classList.remove('no-animate');
}

function checkWinCondition() {
  const isWin = tiles.every(t => t.r === t.targetR && t.c === t.targetC);
  if (isWin) {
    gameActive = false;
    clearInterval(timerInterval);
    
    const isNewBest = moves < bestScores[mode];
    if (isNewBest) {
      bestScores[mode] = moves;
    }
    
    setTimeout(() => showGameOverMenu(isNewBest), 300);
  }
}

/* ── GAME OVER ── */
function showGameOverMenu(isNewBest) {
  document.getElementById('ws-time').textContent = finalTimeString;
  document.getElementById('ws-score').textContent = moves;
  
  const bestBox = document.getElementById('ws-best-box');
  if (bestScores[mode] !== Infinity) {
    bestBox.style.display = 'flex';
    document.getElementById('ws-best').textContent = bestScores[mode];
  } else {
    bestBox.style.display = 'none';
  }
  
  const title = document.getElementById('win-title');
  const sub = document.getElementById('win-sub');
  
  if (isNewBest) {
    title.textContent = "New Best!";
    title.style.color = "var(--lime)";
    sub.textContent = `Incredible! Solved in a record ${moves} moves.`;
    document.getElementById('win-box').style.borderColor = "var(--lime)";
    spawnConfetti();
  } else {
    title.textContent = "Puzzle Solved!";
    title.style.color = "var(--cyan)";
    sub.textContent = `You reordered everything in ${moves} moves.`;
    document.getElementById('win-box').style.borderColor = "var(--cyan)";
  }
  
  updateBestUI();
  overlay.classList.add('show');
}

/* ── CONFETTI (for records) ── */
const CONF=['#7ed321','#ff7b00','#00d4ff','#ff4da6','#ffd60a','#fff'];
function spawnConfetti(){
  for(let i=0;i<60;i++){
    const p=document.createElement('div'); 
    p.className='confetti-piece';
    p.style.cssText=`
      position:fixed; pointer-events:none; z-index:9999;
      left:${Math.random()*100}vw; top:-20px;
      background:${CONF[Math.floor(Math.random()*CONF.length)]};
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation: confettiFall ${1.8+Math.random()*2.4}s linear ${Math.random()*.9}s both;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

const style = document.createElement('style');
style.textContent = `
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
`;
document.head.appendChild(style);

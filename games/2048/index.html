<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>2048 — PlayHive.Net</title>
  <style>
    :root {
      --navy:#0d1b2a;--navy-mid:#132338;--navy-card:#1a2f47;
      --lime:#7ed321;--lime-dark:#5fab00;
      --orange:#ff7b00;--cyan:#00d4ff;--pink:#ff4da6;--yellow:#ffd60a;
      --text:#e8f1fa;--text-dim:#7a99bb;--text-dark:#3d5a75;
      --border:rgba(255,255,255,0.08);--border-lime:rgba(126,211,33,0.3);
      --radius:10px;--radius-lg:14px;--gap:10px;--pad:10px;--slide-dur:110ms;
    }
	@font-face {
	  font-family: 'Fredoka One';
	  src: url("../../fonts/fredokaone.woff2") format("woff2");
	  font-weight: 400;
	  font-style: normal;
	}
	@font-face {
	  font-family: 'Nunito';
	  src: url("../../fonts/Nunito-VariableFont_wght.ttf") format("truetype");
	  font-weight: 200 900;
	  font-style: normal;
	}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{
      font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;position:relative;
      user-select:none;-webkit-user-select:none;
    }
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;z-index:0}

    /* Blue + white ambient blobs */
    .glow-blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.18;}
    .glow-blob-1{width:350px;height:350px;background:#00d4ff;top:-80px;left:-80px;}
    .glow-blob-2{width:280px;height:280px;background:#ffffff;bottom:-60px;right:-60px;}

    /* ── WRAPPER ── */
    .game-wrapper{
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;
      gap:10px;padding:16px;width:100%;max-width:440px;
    }

    /* ── HEADER ── */
    .game-header{width:100%;display:flex;align-items:flex-start;justify-content:space-between;}
    .title-block{}
    .game-title{
      font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--lime);
      letter-spacing:.04em;line-height:1;
    }
    .game-subtitle{
      font-size:.62rem;font-weight:800;text-transform:uppercase;
      letter-spacing:.1em;color:var(--text-dark);margin-top:3px;
    }
    .score-row{display:flex;gap:8px;margin-top:2px;}
    .score-box{
      background:var(--navy-card);border:2px solid var(--border);
      border-radius:var(--radius);padding:5px 14px;text-align:center;min-width:68px;
    }
    .score-label{font-size:.58rem;font-weight:900;text-transform:uppercase;
      letter-spacing:.12em;color:var(--text-dim);}
    .score-val{font-family:'Fredoka One',cursive;font-size:1.35rem;line-height:1.1;color:#fff;}

    /* ── BOARD WRAP ── */
    .board-wrap{position:relative;width:100%;z-index:1;}
    .grid-bg{
      background:var(--navy-mid);border:2px solid var(--border);
      border-radius:var(--radius-lg);padding:var(--pad);
      display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap);
      box-shadow:0 12px 40px rgba(0,0,0,.5);
    }
    .cell-bg{background:rgba(255,255,255,0.04);border-radius:8px;aspect-ratio:1;}
    #tile-canvas{position:absolute;
      top:calc(var(--pad) + 2px);left:calc(var(--pad) + 2px);
      right:calc(var(--pad) + 2px);bottom:calc(var(--pad) + 2px);
      pointer-events:none;}

    /* ── TILES ── */
    .tile{position:absolute;display:flex;align-items:center;justify-content:center;
      border-radius:8px;font-family:'Fredoka One',cursive;font-size:1.6rem;letter-spacing:.02em;
      transition:left var(--slide-dur) cubic-bezier(0.16,1,0.3,1),
                 top  var(--slide-dur) cubic-bezier(0.16,1,0.3,1);
      will-change:left,top;z-index:1;}
    .tile.is-new{animation:tileAppear .14s ease both;animation-delay:calc(var(--slide-dur) + 10ms);}
    .tile.is-merged{animation:tilePop .2s ease both;animation-delay:var(--slide-dur);z-index:2;}
    @keyframes tileAppear{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes tilePop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
    .t2   {background:#1d3a22;color:#a8e87a;border:1px solid rgba(126,211,33,.2)}
    .t4   {background:#1e3d1a;color:#b5f07f;border:1px solid rgba(126,211,33,.3)}
    .t8   {background:#5fab00;color:#fff;box-shadow:0 0 12px rgba(95,171,0,.4)}
    .t16  {background:#7ed321;color:#0d1b2a;box-shadow:0 0 14px rgba(126,211,33,.5)}
    .t32  {background:#ff7b00;color:#fff;box-shadow:0 0 14px rgba(255,123,0,.45)}
    .t64  {background:#e06900;color:#fff;box-shadow:0 0 16px rgba(224,105,0,.5)}
    .t128 {background:#ffd60a;color:#1a0f00;box-shadow:0 0 18px rgba(255,214,10,.5);font-size:1.3rem}
    .t256 {background:#ffb700;color:#1a0f00;box-shadow:0 0 20px rgba(255,183,0,.55);font-size:1.3rem}
    .t512 {background:#00d4ff;color:#001a26;box-shadow:0 0 22px rgba(0,212,255,.5);font-size:1.3rem}
    .t1024{background:#0099cc;color:#fff;box-shadow:0 0 24px rgba(0,153,204,.55);font-size:1.1rem}
    .t2048{background:linear-gradient(135deg,#ffd60a,#ff7b00);color:#1a0900;
      box-shadow:0 0 30px rgba(255,214,10,.7),0 0 60px rgba(255,123,0,.4);
      font-size:1.1rem;animation:shimmer 2s ease-in-out infinite}
    .t4096{background:linear-gradient(135deg,#ff4da6,#a855f7);color:#fff;
      box-shadow:0 0 30px rgba(255,77,166,.6);font-size:1.1rem}
    .thigh{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;
      box-shadow:0 0 30px rgba(168,85,247,.6);font-size:1rem}
    @keyframes shimmer{
      0%,100%{box-shadow:0 0 30px rgba(255,214,10,.7),0 0 60px rgba(255,123,0,.4)}
      50%{box-shadow:0 0 45px rgba(255,214,10,.9),0 0 90px rgba(255,123,0,.6)}}

    /* ── OVERLAYS ── */
    .overlay{
      position:absolute;inset:0;border-radius:var(--radius-lg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:10;
      background:rgba(13,27,42,0.94);backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);text-align:center;padding:28px;
      transition:opacity .25s;
    }
    .overlay.hidden{display:none;}
    .overlay:not(.hidden){animation:popIn .3s ease both;}
    .overlay-emoji{font-size:3rem;line-height:1;}
    .overlay-title{
      font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;
      letter-spacing:.03em;line-height:1.1;
    }
    .overlay-title em{font-style:normal;color:var(--lime);}
    .overlay-title .bad{color:var(--orange);}
    .overlay-sub{font-size:.85rem;font-weight:700;color:var(--text-dim);max-width:240px;line-height:1.6;}
    .overlay-score{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--lime);}
    .overlay-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

    /* ── PLAY BUTTON ── */
    .btn-play{
      display:inline-flex;align-items:center;gap:8px;
      font-family:'Fredoka One',cursive;font-size:1.1rem;letter-spacing:.04em;
      padding:13px 36px;border-radius:100px;border:none;cursor:pointer;
      background:var(--lime);color:var(--navy);
      box-shadow:0 4px 20px rgba(126,211,33,.4);transition:all .2s;
    }
    .btn-play:hover{background:var(--lime-dark);transform:translateY(-2px);box-shadow:0 8px 28px rgba(126,211,33,.5);}
    .btn-play:active{transform:translateY(0);}

    .btn-play-ghost{
      display:inline-flex;align-items:center;gap:8px;
      font-family:'Fredoka One',cursive;font-size:1.1rem;letter-spacing:.04em;
      padding:13px 36px;border-radius:100px;border:2px solid var(--border);cursor:pointer;
      background:var(--navy-card);color:var(--text-dim);transition:all .2s;
    }
    .btn-play-ghost:hover{border-color:var(--lime);color:var(--lime);}

    /* ── BOTTOM BAR ── */
    .bottom-bar{
      display:flex;align-items:center;justify-content:space-between;width:100%;
    }
    /* Undo pill */
    #btn-undo{
      display:inline-flex;align-items:center;gap:6px;
      font-family:'Fredoka One',cursive;font-size:.82rem;letter-spacing:.03em;
      padding:7px 16px;border-radius:100px;
      border:2px solid var(--border);cursor:pointer;
      background:var(--navy-card);color:var(--text-dim);
      transition:opacity .2s, border-color .2s, color .2s;
    }
    #btn-undo:hover:not(:disabled){border-color:var(--lime);color:var(--lime);}
    #btn-undo:disabled{opacity:0.35;cursor:default;}

    .hint{font-size:.68rem;font-weight:800;text-transform:uppercase;
      letter-spacing:.1em;color:var(--text-dark);}

    /* Score delta */
    .score-delta{position:absolute;top:0;right:14px;font-family:'Fredoka One',cursive;
      font-size:1rem;color:var(--lime);pointer-events:none;
      animation:deltaFloat .9s ease forwards;z-index:20}
    @keyframes deltaFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-32px)}}

    @keyframes undoFlash{
      0%  {box-shadow:0 12px 40px rgba(0,0,0,.5);}
      35% {box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 3px rgba(126,211,33,.7),0 0 20px 4px rgba(126,211,33,.3);}
      100%{box-shadow:0 12px 40px rgba(0,0,0,.5);}
    }
    .grid-bg.undo-flash{animation:undoFlash .45s ease;}

    @keyframes popIn{
      from{opacity:0;transform:scale(0.85) translateY(12px);}
      to{opacity:1;transform:scale(1) translateY(0);}
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
    }
    .shake{animation:shake .35s ease both;}
  </style>
</head>
<body>

<div class="glow-blob glow-blob-1"></div>
<div class="glow-blob glow-blob-2"></div>

<div class="game-wrapper">

  <!-- Header: big lime title + subtitle on left, score boxes on right -->
  <div class="game-header">
    <div class="title-block">
      <div class="game-title">2048</div>
      <div class="game-subtitle">Numbers &middot; Ages 8&ndash;14 &middot; Medium</div>
    </div>
    <div class="score-row">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap" id="board-wrap">
    <div class="grid-bg" id="grid-bg">
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
    </div>
    <div id="tile-canvas"></div>

    <!-- Start screen — matches reference exactly -->
    <div class="overlay" id="screen-start">
      <div class="overlay-emoji">
        <img src="icon.png" alt="icon" style="width: 110px; height: 110px;">
      </div>
      <div class="overlay-title">Join Tiles</div>
      <div class="overlay-sub">Swipe or use arrows to merge the same numbers. Reach 2048!</div>
      <button class="btn-play" id="btn-start">&#9654; Start</button>
    </div>

    <!-- Game Over -->
    <div class="overlay hidden" id="overlay-gameover">
      <div class="overlay-emoji">💥</div>
      <div class="overlay-title"><span class="bad">Game Over!</span></div>
      <div class="overlay-score" id="final-score-display"></div>
      <div class="overlay-sub" id="over-msg"></div>
      <div class="overlay-btns">
        <button class="btn-play" id="btn-restart">↺ Play Again</button>
      </div>
    </div>

    <!-- Win -->
    <div class="overlay hidden" id="overlay-win">
      <div class="overlay-emoji">🏆</div>
      <div class="overlay-title"><em>You Win!</em></div>
      <div class="overlay-sub">You reached <strong style="color:var(--lime)">2048!</strong><br>Keep going or start fresh.</div>
      <div class="overlay-btns">
        <button class="btn-play-ghost" id="btn-keep-going">&#9654; Keep Going</button>
        <button class="btn-play" id="btn-new-from-win">↺ New Game</button>
      </div>
    </div>
  </div>

  <!-- Bottom bar: Undo Move pill left, hint right — matches reference -->
  <div class="bottom-bar">
    <button id="btn-undo" disabled>↩ Undo Move</button>
    <div class="hint">Arrow Keys or Swipe &nbsp;·&nbsp; U to Undo</div>
  </div>

</div>

<script>
const SIZE=4,SLIDE_MS=110;
let board=[],prevBoard=[],prevScore=0,score=0;
let best=parseInt(localStorage.getItem('2048-best')||'0');
let won=false,keepGoingFlag=false,gameOver=false,animLock=false;
let nextId=0,tiles=[],gameStarted=false;

const tileCanvas=document.getElementById('tile-canvas');
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
const finalScoreDisplay=document.getElementById('final-score-display');
const overMsg=document.getElementById('over-msg');
const goOverlay=document.getElementById('overlay-gameover');
const winOverlay=document.getElementById('overlay-win');
const screenStart=document.getElementById('screen-start');
const boardWrap=document.getElementById('board-wrap'),gridBg=document.getElementById('grid-bg');
const btnUndo=document.getElementById('btn-undo');

function hideAll(){
  screenStart.classList.add('hidden');
  goOverlay.classList.add('hidden');
  winOverlay.classList.add('hidden');
}
function syncUndoBtn(){
  const can=gameStarted&&prevBoard.length>0&&!gameOver&&!animLock;
  btnUndo.disabled=!can;
}
function metrics(){
  const cell=gridBg.querySelector('.cell-bg');
  const size=cell.getBoundingClientRect().width;
  const gap=parseFloat(getComputedStyle(gridBg).gap)||10;
  return{size,gap};
}
function tileXY(row,col){
  const{size,gap}=metrics();
  return{x:col*(size+gap),y:row*(size+gap),size};
}
function tClass(v){
  const m={2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',
    128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048',4096:'t4096'};
  return m[v]||'thigh';
}
function createEl(value,row,col){
  const el=document.createElement('div');
  el.className='tile '+tClass(value);
  el.textContent=value;
  const{x,y,size}=tileXY(row,col);
  el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;';
  tileCanvas.appendChild(el);
  return el;
}
function moveEl(el,row,col){
  const{x,y}=tileXY(row,col);
  el.style.left=x+'px';el.style.top=y+'px';
}
function updateEl(el,value){
  el.textContent=value;el.className='tile '+tClass(value);
}
function emptyBoard(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0));}
function cloneBoard(b){return b.map(r=>[...r]);}
function emptySlots(b){
  const s=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!b[r][c]) s.push([r,c]);
  return s;
}
function spawnRandom(b,delay){
  const slots=emptySlots(b);
  if(!slots.length) return;
  const[r,c]=slots.splice(Math.floor(Math.random()*slots.length),1)[0];
  const v=Math.random()<0.9?2:4;
  b[r][c]=v;
  const tile={id:nextId++,value:v,row:r,col:c,el:null};
  tiles.push(tile);
  const spawn=()=>{tile.el=createEl(v,r,c);tile.el.classList.add('is-new');};
  if(delay) setTimeout(spawn,SLIDE_MS+15); else spawn();
}
function slideRow(row){
  const items=row.filter(x=>x!==null);
  const moves=[],out=Array(SIZE).fill(null);
  let w=0,scored=0;
  for(let i=0;i<items.length;i++){
    if(i+1<items.length&&items[i].val===items[i+1].val){
      const mv=items[i].val*2; scored+=mv;
      moves.push({id:items[i].id,toCol:w,isAbsorbed:false,mergedVal:mv});
      moves.push({id:items[i+1].id,toCol:w,isAbsorbed:true,mergedVal:null});
      out[w++]={val:mv,id:items[i].id}; i++;
    } else {
      moves.push({id:items[i].id,toCol:w,isAbsorbed:false,mergedVal:null});
      out[w++]={val:items[i].val,id:items[i].id};
    }
  }
  return{out,moves,scored};
}
function move(dir){
  if(!gameStarted||animLock||gameOver) return;
  const grid=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
  for(const t of tiles) grid[t.row][t.col]={val:t.value,id:t.id};
  const isVert=dir==='up'||dir==='down';
  const isRev=dir==='right'||dir==='down';
  let anyMoved=false,totalScored=0;
  const allMoves=[];
  for(let i=0;i<SIZE;i++){
    let row=[];
    for(let j=0;j<SIZE;j++) row.push(isVert?grid[j][i]:grid[i][j]);
    if(isRev) row=[...row].reverse();
    const{moves,scored}=slideRow(row);
    totalScored+=scored;
    for(const m of moves){
      let lf=row.findIndex(x=>x&&x.id===m.id);
      let lt=m.toCol;
      if(isRev){lf=SIZE-1-lf;lt=SIZE-1-lt;}
      let toRow,toCol,fromRow,fromCol;
      if(isVert){fromRow=lf;fromCol=i;toRow=lt;toCol=i;}
      else{fromRow=i;fromCol=lf;toRow=i;toCol=lt;}
      if(fromRow!==toRow||fromCol!==toCol) anyMoved=true;
      allMoves.push({id:m.id,toRow,toCol,isAbsorbed:m.isAbsorbed,mergedVal:m.mergedVal});
    }
  }
  if(!anyMoved) return;
  prevBoard=cloneBoard(board); prevScore=score;
  animLock=true;
  for(const m of allMoves){
    const t=tiles.find(x=>x.id===m.id);
    if(!t) continue;
    t.row=m.toRow; t.col=m.toCol;
    if(t.el) moveEl(t.el,m.toRow,m.toCol);
  }
  setTimeout(()=>{
    for(const m of allMoves){
      if(m.isAbsorbed){
        const t=tiles.find(x=>x.id===m.id);
        if(t){t.el&&t.el.remove();tiles=tiles.filter(x=>x.id!==m.id);}
      }
    }
    for(const m of allMoves){
      if(!m.isAbsorbed&&m.mergedVal){
        const t=tiles.find(x=>x.id===m.id);
        if(t){
          t.value=m.mergedVal;
          if(t.el){
            updateEl(t.el,m.mergedVal);
            t.el.classList.remove('is-merged');
            void t.el.offsetWidth;
            t.el.classList.add('is-merged');
          }
        }
      }
    }
    score+=totalScored;
    if(score>best){best=score;localStorage.setItem('2048-best',best);}
    scoreEl.textContent=score; bestEl.textContent=best;
    board=emptyBoard();
    for(const t of tiles) board[t.row][t.col]=t.value;
    spawnRandom(board,true);
    if(totalScored>0){
      const d=document.createElement('div');
      d.className='score-delta'; d.textContent='+'+totalScored;
      boardWrap.appendChild(d);
      d.addEventListener('animationend',()=>d.remove());
    }
    animLock=false; syncUndoBtn(); checkState();
  },SLIDE_MS+20);
}
function checkState(){
  if(!won&&!keepGoingFlag&&board.some(r=>r.includes(2048))){won=true;showWin();return;}
  if(!emptySlots(board).length){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(c<SIZE-1&&board[r][c]===board[r][c+1]) return;
      if(r<SIZE-1&&board[r][c]===board[r+1][c]) return;
    }
    showGameOver();
  }
}
function showGameOver(){
  gameOver=true;
  const isRecord=score>=best&&score>0;
  finalScoreDisplay.textContent='Score: '+score;
  overMsg.textContent=isRecord?'🎉 New Best Score!':score===0?'Better luck next time!':'Your best is '+best+' — keep it up!';
  gridBg.classList.remove('shake');
  void gridBg.offsetWidth;
  gridBg.classList.add('shake');
  setTimeout(()=>goOverlay.classList.remove('hidden'),350);
  syncUndoBtn();
}
function showWin(){winOverlay.classList.remove('hidden');}
function keepGoing(){keepGoingFlag=true;winOverlay.classList.add('hidden');}
function doUndo(){
  if(btnUndo.disabled) return;
  animLock=true; syncUndoBtn();
  gridBg.classList.remove('undo-flash');
  void gridBg.offsetWidth;
  gridBg.classList.add('undo-flash');
  gridBg.addEventListener('animationend',()=>gridBg.classList.remove('undo-flash'),{once:true});
  const prevTiles=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(prevBoard[r][c])
    prevTiles.push({row:r,col:c,value:prevBoard[r][c]});
  const UNDO_MS=160;
  for(const t of tiles){
    if(t.el) t.el.style.transition=
      `left ${UNDO_MS}ms cubic-bezier(0.16,1,0.3,1),top ${UNDO_MS}ms cubic-bezier(0.16,1,0.3,1),opacity ${UNDO_MS}ms ease`;
  }
  const prevSlots=[...prevTiles];
  const matched=new Set();
  for(const t of tiles){
    const idx=prevSlots.findIndex((p,i)=>!matched.has(i)&&p.value===t.value);
    if(idx!==-1){
      matched.add(idx);
      const dest=prevSlots[idx];
      t.row=dest.row; t.col=dest.col;
      if(t.el) moveEl(t.el,dest.row,dest.col);
    } else {
      if(t.el) t.el.style.opacity='0';
    }
  }
  setTimeout(()=>{
    tiles.forEach(t=>t.el&&t.el.remove()); tiles=[];nextId=0;
    board=cloneBoard(prevBoard); score=prevScore;
    prevBoard=[]; prevScore=0;
    scoreEl.textContent=score; bestEl.textContent=best;
    goOverlay.classList.add('hidden'); winOverlay.classList.add('hidden');
    gameOver=false; won=false; keepGoingFlag=false;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]){
      const v=board[r][c];
      const t={id:nextId++,value:v,row:r,col:c,el:null};
      t.el=createEl(v,r,c); tiles.push(t);
    }
    animLock=false; syncUndoBtn();
  },UNDO_MS+20);
}
function startGame(){
  hideAll();
  tiles.forEach(t=>t.el&&t.el.remove());
  tiles=[];nextId=0;board=emptyBoard();score=0;
  won=false;keepGoingFlag=false;gameOver=false;animLock=false;
  prevBoard=[];prevScore=0;
  scoreEl.textContent='0';
  gameStarted=true;
  syncUndoBtn();
  for(let i=0;i<2;i++) spawnRandom(board,false);
}

btnUndo.addEventListener('click', doUndo);
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('btn-keep-going').addEventListener('click', keepGoing);
document.getElementById('btn-new-from-win').addEventListener('click', startGame);

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
    a:'left',d:'right',w:'up',s:'down',A:'left',D:'right',W:'up',S:'down'};
  const d=map[e.key];
  if(d){e.preventDefault();move(d);return;}
  if((e.key==='n'||e.key==='N')&&gameStarted){startGame();return;}
  if((e.key==='u'||e.key==='U')&&gameStarted){doUndo();return;}
});
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
},{passive:false});

// Swipe support
let tx=0,ty=0;
boardWrap.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
boardWrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
},{passive:true});

window.addEventListener('resize',()=>{
  for(const t of tiles){
    if(!t.el) continue;
    const{x,y,size}=tileXY(t.row,t.col);
    t.el.style.transition='none';
    t.el.style.left=x+'px';t.el.style.top=y+'px';
    t.el.style.width=size+'px';t.el.style.height=size+'px';
    requestAnimationFrame(()=>{if(t.el)t.el.style.transition='';});
  }
});

bestEl.textContent=best;
syncUndoBtn();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Lock — PlayHive</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0d1b2a;
      --navy-mid:    #132338;
      --navy-card:   #1a2f47;
      --navy-light:  #1f3a57;
      --lime:        #7ed321;
      --lime-dark:   #5fab00;
      --lime-glow:   rgba(126,211,33,0.18);
      --orange:      #ff7b00;
      --cyan:        #00d4ff;
      --pink:        #ff4da6;
      --yellow:      #ffd60a;
      --text:        #e8f1fa;
      --text-dim:    #7a99bb;
      --text-dark:   #3d5a75;
      --border:      rgba(255,255,255,0.08);
      --border-lime: rgba(126,211,33,0.3);
      --radius:      10px;
      --radius-lg:   16px;
    }
	
	@font-face {
	  font-family: 'Fredoka One';
	  src: url("../../fonts/fredokaone.woff2") format("woff2");
	  font-weight: 400;
	  font-style: normal;
	}
	@font-face {
	  font-family: 'Nunito';
	  src: url("../../fonts/Nunito-VariableFont_wght.ttf") format("truetype");
	  font-weight: 200 900;
	  font-style: normal;
	}

	html, body { 
      height: 100%; 
      width: 100%; 
      overflow: hidden; /* Forcibly prevents all scrollbars */
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--navy);
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh; /* Uses exact dynamic screen height */
    }



    /* ── Page Body ──────────────────────────────────────────── */
    .page {
      width: 100%;
      max-width: 480px;
      height: 100%; /* Take full body height */
      padding: max(32px, 5vh) 16px max(32px, 5vh);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* Spreads out title, grid, and keyboard */
      gap: clamp(8px, 2vh, 16px);
    }

    .game-title {
      font-family: 'Fredoka One', sans-serif;
      font-size: 2rem;
      color: var(--text);
      text-align: center;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-top: -10px;
    }

    /* ── Grid ───────────────────────────────────────────────── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: min(1vh, 6px); /* Shrink gaps on short screens */
    }

    .grid-row {
      display: flex;
      gap: min(1vh, 6px);
    }

    .tile {
      /* Scales based on width (vw), height (vh), but caps at 58px */
      width: min(14vw, 8vh, 58px); 
      height: min(14vw, 8vh, 58px);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--navy-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', sans-serif;
      font-size: min(1.6rem, 5vh); /* Shrink font on short screens */
      color: var(--text);
      text-transform: uppercase;
      position: relative;
      perspective: 250px;
      cursor: default;
      user-select: none;
      transition: border-color 0.2s;
    }

    /* Glow pulse on active row */
    .grid-row.active .tile {
      animation: rowPulse 2.5s ease-in-out infinite;
    }
    .grid-row.active .tile.filled {
      animation: none;
    }

    @keyframes rowPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(126,211,33,0); }
      50%       { box-shadow: 0 0 10px 3px var(--lime-glow); }
    }

    /* Pop-in when letter typed */
    @keyframes popIn {
      0%   { transform: scale(0.85); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .tile.pop { animation: popIn 0.1s ease; }

    /* Flip reveal — scaleY squeeze, color swaps at midpoint */
    @keyframes flipReveal {
      0%   { transform: scaleY(1); }
      49%  { transform: scaleY(0); }
      50%  { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }
    .tile.revealing { animation: flipReveal 0.45s ease forwards; }

    .tile.correct { background: #538d4e; color: #fff; border-color: #538d4e; }
    .tile.present { background: #b59f3b; color: #fff; border-color: #b59f3b; }
    .tile.absent  { background: #3a3a3c; color: #aaa; border-color: #3a3a3c; }

    /* Shake on invalid */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .grid-row.shake { animation: shake 0.4s ease; }

    /* ── Keyboard ───────────────────────────────────────────── */
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      width: 100%;
    }

    .kb-row {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .key {
      background: var(--navy-card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      min-width: 36px;
      height: min(7vh, 46px); /* Cap at 46px, but shrink on short displays */
      padding: 0 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, filter 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      user-select: none;
    }

    .key:hover  { filter: brightness(1.25); transform: translateY(-1px); }
    .key:active { transform: translateY(1px); }

    .key.enter {
      font-family: 'Fredoka One', sans-serif;
      background: var(--lime);
      color: var(--navy);
      min-width: 58px;
      font-size: 14px;
    }

    .key.backspace {
      background: var(--navy-light);
      min-width: 46px;
      font-size: 16px;
    }

    .key.absent   { background: #3a3a3c; color: #888; border-color: transparent; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 16px;
      left: 16px; /* Pins container to the left edge */
      /* transform: translateX(-50%); <-- REMOVED this */
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start; /* Aligns multiple toasts to the left instead of center */
      z-index: 500;
      pointer-events: none;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: translateY(-10px); }
    }

	.toast {
	  background: rgba(28, 28, 30, 0.75); /* glassy dark */
	  backdrop-filter: blur(12px);
	  -webkit-backdrop-filter: blur(12px);

	  color: rgba(255, 255, 255, 0.9);
	  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
	  font-weight: 500;
	  font-size: 14px;

	  padding: 12px 16px;
	  border-radius: 14px;

	  box-shadow: 
		0 8px 30px rgba(0, 0, 0, 0.35),
		inset 0 0 0 0.5px rgba(255,255,255,0.06);

	  animation: toastIn 0.25s ease;
	  white-space: nowrap;

	  display: inline-flex;
	  align-items: center;
	  gap: 10px;
	}

	.toast.win {
	  color: #32d74b; /* Apple green */
	}

	.toast.loss {
	  color: #ff375f; /* Apple red/pink */
	}

    /* ── New Game Button ────────────────────────────────────── */
    .new-game-wrap {
      display: none;
      justify-content: center;
      margin-top: 4px;
    }
    .new-game-wrap.visible { display: flex; }

    .btn-lime {
      font-family: 'Fredoka One', sans-serif;
      font-size: 17px;
      background: var(--lime);
      color: var(--navy);
      border: none;
      border-radius: 100px;
      padding: 13px 36px;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--lime-glow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-lime:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(126,211,33,0.35); }
    .btn-lime:active { transform: translateY(0); }

    /* ── Confetti ───────────────────────────────────────────── */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Live region ────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    @media (max-width: 400px) {
      .tile { width: 52px; height: 52px; font-size: 1.4rem; }
      .key  { min-width: 30px; font-size: 12px; }
      .key.enter, .key.backspace { min-width: 40px; }
    }
	
	/* ── Screen & Modal Management ──────────────────────────── */
    .screen {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .screen.active { display: flex; }

    /* Main Menu */
    #main-menu { justify-content: center; gap: 24px; }
    .menu-logo {
      font-family: 'Fredoka One', sans-serif;
      font-size: 3.5rem;
      color: var(--lime);
      text-shadow: 0 4px 20px var(--lime-glow);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* Game Over Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(13, 27, 42, 0.85); /* Dark navy glassy */
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 900; /* Below confetti (999) so it rains over the modal */
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.visible { display: flex; opacity: 1; }
    
    .modal-card {
      background: var(--navy-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .modal-overlay.visible .modal-card { transform: translateY(0); }

    .modal-title { font-family: 'Fredoka One', sans-serif; font-size: 2.2rem; }
    .modal-title.win { color: var(--lime); }
    .modal-title.loss { color: var(--pink); }
    .modal-word-wrap { color: var(--text-dim); font-size: 1rem; margin-bottom: 8px; }
    .modal-word { color: var(--text); font-weight: 800; font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase;}
	
	body {
	  -webkit-user-select: none;
	  -moz-user-select: none;
	  -ms-user-select: none;
	  user-select: none;
	}
	
  </style>
</head>

<!-- Toast container -->
<div class="toast-container" id="toast-container" aria-live="polite" aria-label="Game messages"></div>

<!-- Main -->
<div id="main-menu" class="screen active">
  <div class="menu-logo">Letter Lock</div>
  <p class="subtitle" style="font-size: 16px; margin-bottom: 20px;">Guess the 5-letter word in 6 tries</p>
  <button class="btn-lime" id="btn-start-game">▶ Play Now</button>
</div>

<main class="page screen" id="game-screen" role="main">

  <div class="grid" id="grid" role="grid" aria-label="Guessing grid"></div>

  <div class="keyboard" id="keyboard" role="group" aria-label="On-screen keyboard">
    <div class="kb-row" id="kb-row-0"></div>
    <div class="kb-row" id="kb-row-1"></div>
    <div class="kb-row" id="kb-row-2"></div>
  </div>
  
  </main>

<div class="modal-overlay" id="game-over-modal">
  <div class="modal-card">
    <div class="modal-title" id="modal-title">You Won!</div>

    <button class="btn-lime" id="btn-play-again">Play Again</button>
  </div>
</div>

/* ══════════════════════════════════════════════════════════════════
   BUILD GRID
══════════════════════════════════════════════════════════════════ */
function buildGrid() {
  gridEl.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.setAttribute('role', 'row');
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('role', 'gridcell');
      tile.setAttribute('aria-label', `Row ${r+1} letter ${c+1}`);
      tile.id = `tile-${r}-${c}`;
      tile.appendChild(document.createTextNode(''));
      row.appendChild(tile);
    }
    gridEl.appendChild(row);
  }
  setActiveRow(0);
}

/* ══════════════════════════════════════════════════════════════════
   BUILD KEYBOARD
══════════════════════════════════════════════════════════════════ */
const KB_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];

function buildKeyboard() {
  KB_ROWS.forEach((row, ri) => {
    const rowEl = document.getElementById(`kb-row-${ri}`);
    rowEl.innerHTML = '';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      if (k === 'ENTER')   btn.classList.add('enter');
      if (k === '⌫')       btn.classList.add('backspace');
      btn.textContent = k;
      btn.setAttribute('aria-label', k === '⌫' ? 'Backspace' : k === 'ENTER' ? 'Enter' : `Letter ${k}`);
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
    });
  });
}

/* ══════════════════════════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toUpperCase();
  if (k === 'ENTER')     handleKey('ENTER');
  else if (k === 'BACKSPACE') handleKey('⌫');
  else if (/^[A-Z]$/.test(k)) handleKey(k);
});

function handleKey(k) {
  if (gameOver) return;
  if (k === '⌫') {
    deleteLetter();
  } else if (k === 'ENTER') {
    submitGuess();
  } else if (/^[A-Z]$/.test(k) && currentCol < 5) {
    addLetter(k);
  }
}

function addLetter(letter) {
  if (currentCol >= 5) return;
  currentGuess[currentCol] = letter;
  const tile = getTile(currentRow, currentCol);
  tile.textContent = letter;
  tile.classList.add('filled', 'pop');
  tile.setAttribute('aria-label', `Row ${currentRow+1} letter ${currentCol+1}: ${letter}`);
  tile.addEventListener('animationend', () => tile.classList.remove('pop'), { once: true });
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  currentGuess[currentCol] = '';
  const tile = getTile(currentRow, currentCol);
  tile.textContent = '';
  tile.classList.remove('filled');
  tile.setAttribute('aria-label', `Row ${currentRow+1} letter ${currentCol+1}`);
}

/* ══════════════════════════════════════════════════════════════════
   SUBMIT
══════════════════════════════════════════════════════════════════ */
function submitGuess() {
  if (currentCol < 5) {
    showToast('Not enough letters', 'warn');
    shakeRow(currentRow);
    return;
  }

  const word = currentGuess.join('');

  if (!ALL_VALID.has(word)) {
    showToast('Not in word list', 'warn');
    shakeRow(currentRow);
    return;
  }

  if (guessedWords.has(word)) {
    showToast('Already guessed!', 'warn');
    shakeRow(currentRow);
    return;
  }

  guessedWords.add(word);
  const result = evaluateGuess(word);
  revealRow(currentRow, word, result, () => {
    updateKeyboard(word, result);

    if (word === answer) {
      gameOver = true;
      const msgs = ['🔥 Nailed it!', '⚡ Brilliant!', '🎯 Spot on!', '🌟 Amazing!', '🏆 Legend!'];
      setTimeout(() => {
        showToast(msgs[Math.min(currentRow, msgs.length - 1)], 'win');
        announce(`Correct! The answer was ${answer}`);
        launchConfetti();
        // Trigger Modal
        setTimeout(() => triggerGameOverModal(true, answer), 1500);
      }, 400);
    } else {
      currentRow++;
      currentCol = 0;
      currentGuess = [];
      if (currentRow >= 6) {
        gameOver = true;
        setTimeout(() => {
          showToast(`The word was ${answer}`, 'loss');
          announce(`Game over. The answer was ${answer}`);
          // Trigger Modal
          setTimeout(() => triggerGameOverModal(false, answer), 1000);
        }, 400);
      } else {
        setActiveRow(currentRow);
      }
    }
  });
}

/* ══════════════════════════════════════════════════════════════════
   EVALUATE
══════════════════════════════════════════════════════════════════ */
function evaluateGuess(word) {
  const result = Array(5).fill('absent');
  const ansArr  = answer.split('');
  const used    = Array(5).fill(false);

  // Correct pass
  for (let i = 0; i < 5; i++) {
    if (word[i] === ansArr[i]) {
      result[i] = 'correct';
      used[i]   = true;
    }
  }
  // Present pass
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && word[i] === ansArr[j]) {
        result[i] = 'present';
        used[j]   = true;
        break;
      }
    }
  }
  return result;
}

/* ══════════════════════════════════════════════════════════════════
   REVEAL (3D flip with stagger)
══════════════════════════════════════════════════════════════════ */
function revealRow(rowIdx, word, result, onDone) {
  const rowEl = document.getElementById(`row-${rowIdx}`);
  rowEl.classList.remove('active');
  const tiles = rowEl.querySelectorAll('.tile');
  let completed = 0;

  tiles.forEach((tile, i) => {
    setTimeout(() => {
      // Start squeeze down
      tile.classList.add('revealing');

      // At midpoint of squeeze (225ms), swap in the color
      setTimeout(() => {
        tile.classList.add(result[i]);
        tile.setAttribute('aria-label', `${word[i]} — ${result[i]}`);
      }, 225);

      // After full animation
      setTimeout(() => {
        tile.classList.remove('revealing');
        completed++;
        if (completed === 5 && onDone) onDone();
      }, 450);

    }, i * 120);
  });
}

/* ══════════════════════════════════════════════════════════════════
   KEYBOARD COLOURS
══════════════════════════════════════════════════════════════════ */
const STATE_PRIORITY = { correct: 3, present: 2, absent: 1 };

function updateKeyboard(word, result) {
  for (let i = 0; i < 5; i++) {
    const letter = word[i];
    const state  = result[i];
    if (!keyState[letter] || STATE_PRIORITY[state] > STATE_PRIORITY[keyState[letter]]) {
      keyState[letter] = state;
    }
  }
  // Only apply 'absent' class to grayed-out keys; leave others at default style
  document.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.key;
    if (!k || k.length !== 1) return;
    btn.classList.remove('absent');
    if (keyState[k] === 'absent') btn.classList.add('absent');
  });
}

/* ══════════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════════ */
function getTile(r, c) {
  return document.getElementById(`tile-${r}-${c}`);
}

function setActiveRow(r) {
  document.querySelectorAll('.grid-row').forEach(el => el.classList.remove('active'));
  const row = document.getElementById(`row-${r}`);
  if (row) row.classList.add('active');
}

function shakeRow(r) {
  const row = document.getElementById(`row-${r}`);
  row.classList.remove('shake');
  void row.offsetWidth;
  row.classList.add('shake');
  row.addEventListener('animationend', () => row.classList.remove('shake'), { once: true });
}

/* ── Toast ── */
function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  t.setAttribute('role', 'status');
  toastCon.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut 0.3s ease forwards';
    t.addEventListener('animationend', () => t.remove(), { once: true });
  }, 1800);
}

/* ── SR announce ── */
function announce(msg) {
  srLive.textContent = '';
  requestAnimationFrame(() => { srLive.textContent = msg; });
}

/* ══════════════════════════════════════════════════════════════════
   SCREEN & MODAL FLOW
══════════════════════════════════════════════════════════════════ */
function triggerGameOverModal(isWin, correctWord) {
  modalTitle.textContent = isWin ? 'You Won!' : 'Game Over';
  modalTitle.className = `modal-title ${isWin ? 'win' : 'loss'}`;
  modalWord.textContent = correctWord;
  modalOverlay.classList.add('visible');
  btnPlayAgain.focus();
}

btnStart.addEventListener('click', () => {
  mainMenu.classList.remove('active');
  gameScreen.classList.add('active');
  initGame();
});

btnPlayAgain.addEventListener('click', () => {
  modalOverlay.classList.remove('visible');
  
  // Stop confetti if it's still running
  confettiParticles = []; 
  
  // Quick reset and restart
  initGame();
});

   CONFETTI
══════════════════════════════════════════════════════════════════ */
const confettiCanvas  = document.getElementById('confetti-canvas');
let confettiParticles = [];
let confettiRaf       = null;

function launchConfetti() {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  const colors = ['#7ed321','#ff7b00','#00d4ff','#ff4da6','#ffd60a','#fff'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.35;

  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 7;
    confettiParticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 7,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 5 + Math.random() * 8,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 14,
      life: 1,
      decay: 0.015 + Math.random() * 0.012,
      isRect: Math.random() > 0.4,
    });
  }
  if (!confettiRaf) animateConfetti();
}

function animateConfetti() {
  const ctx = confettiCanvas.getContext('2d');
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => p.life > 0);

  for (const p of confettiParticles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.3; p.vx *= 0.98;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);
    ctx.fillStyle = p.color;
    if (p.isRect) ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
    else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  }

  if (confettiParticles.length > 0) {
    confettiRaf = requestAnimationFrame(animateConfetti);
  } else {
    confettiRaf = null;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

window.addEventListener('resize', () => {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
});

/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
function pickAnswer() {
  return ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
}

function initGame() {
  answer       = pickAnswer();
  currentRow   = 0;
  currentCol   = 0;
  currentGuess = [];
  gameOver     = false;
  guessedWords = new Set();
  Object.keys(keyState).forEach(k => delete keyState[k]);
  buildGrid();
  buildKeyboard();
}
